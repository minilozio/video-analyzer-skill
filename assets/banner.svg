<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E" />
      <stop offset="100%" stop-color="#0F0F17" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF512F" />
      <stop offset="100%" stop-color="#DD2476" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="12" />
  
  <g transform="translate(60, 100)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#primary)" stroke-width="4" filter="url(#glow)" />
    <path d="M-8,-12 L12,0 L-8,12 Z" fill="url(#primary)" filter="url(#glow)" />
  </g>

  <g transform="translate(130, 85)">
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="38" fill="#FFFFFF" letter-spacing="-0.5">Video Analyzer</text>
    <text x="0" y="32" font-family="-apple-system, system-ui, sans-serif" font-weight="500" font-size="18" fill="#8B8B9B">Download, transcribe, and extract insights from any video.</text>
    <text x="0" y="60" font-family="monospace" font-weight="400" font-size="14" fill="#FF512F">yt-dlp • whisper-cpp • ffmpeg</text>
  </g>
</svg>